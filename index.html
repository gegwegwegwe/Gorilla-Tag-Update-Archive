<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse and search the complete Gorilla Tag build archive. Copy depot download commands for Steam, Oculus PC, and Quest APKs.">
    <meta name="theme-color" content="#10b981">
    <meta property="og:title" content="Gorilla Tag Depot Archive">
    <meta property="og:description" content="Complete build archive for Gorilla Tag — browse, search, and copy depot commands across all platforms.">
    <meta property="og:type" content="website">
    <title>Gorilla Tag Depot Archive</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body class="min-h-screen bg-[#0a0a0a] bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-gray-900 via-[#0a0a0a] to-[#050505] text-gray-300 p-4 sm:p-8 flex flex-col items-center selection:bg-emerald-500/30 selection:text-emerald-200 antialiased">

    <!-- Header / Controls -->
    <header class="w-full max-w-5xl mx-auto space-y-6" role="banner">

        <div class="header-card bg-gray-900/40 backdrop-blur-xl border border-white/5 p-6 sm:p-8 rounded-3xl sticky top-4 z-40 shadow-2xl shadow-black/50">
            
            <div class="flex flex-col lg:flex-row gap-6 justify-between items-start lg:items-center">
                
                <!-- Title Block -->
                <div>
                    <h1 class="text-3xl font-extrabold tracking-tight flex items-center gap-3">
                        <span class="w-2.5 h-8 bg-gradient-to-b from-emerald-400 to-emerald-600 rounded-full shadow-[0_0_15px_rgba(16,185,129,0.4)]" aria-hidden="true"></span>
                        <span class="bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400 drop-shadow-sm">Gorilla Tag Archive</span>
                    </h1>
                    <p class="text-sm text-gray-500 mt-2 pl-5 flex items-center gap-2 font-medium">
                        <span id="total-updates-count" class="text-emerald-400">0</span> builds indexed
                        <span id="year-range" class="opacity-70"></span>
                        <span class="w-1 h-1 rounded-full bg-gray-700"></span>
                        <span id="filtered-count" class="text-gray-400"></span>
                    </p>
                </div>

                <!-- Platform Segmented Control (3-Way) -->
                <div class="flex bg-black/50 p-1.5 rounded-2xl border border-white/5 shadow-inner w-full lg:w-auto relative overflow-hidden group">
                    <button id="platform-steam" onclick="setPlatform('steam')" 
                        class="platform-btn flex-1 sm:flex-none flex items-center justify-center gap-2 px-5 py-2.5 rounded-xl text-xs font-bold transition-all uppercase tracking-widest text-white bg-white/10 shadow-sm border border-white/5 relative z-10">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12c0 5.52 4.48 10 10 10 5.52 0 10-4.48 10-10C22 6.48 17.52 2 12 2zm4.64 14.08c-.68 0-1.22-.54-1.22-1.22 0-.68.54-1.22 1.22-1.22.68 0 1.22.54 1.22 1.22 0 .68-.54 1.22-1.22 1.22zm-4.64-2.84c-1.74 0-3.16 1.42-3.16 3.16 0 1.74 1.42 3.16 3.16 3.16 1.74 0 3.16-1.42 3.16-3.16 0-1.74-1.42-3.16-3.16-3.16zm-4.22-2.1c-.86 0-1.56.7-1.56 1.56 0 .86.7 1.56 1.56 1.56.86 0 1.56-.7 1.56-1.56 0-.86-.7-1.56-1.56-1.56zm10.74-3.52l-2.4 3.48c-.68-.26-1.42-.4-2.18-.4-3.3 0-5.98 2.68-5.98 5.98 0 .52.08 1.02.2 1.5l-3.24 1.42c-.54.24-1.18.06-1.52-.44-.34-.5-.26-1.16.2-1.56l3.66-3.1c-.04-.26-.06-.52-.06-.8 0-2.88 2.34-5.22 5.22-5.22.84 0 1.62.2 2.32.54l2.42-3.52c.3-.44.92-.6 1.42-.38.5.22.74.82.52 1.32l-1.08 2.6z"/></svg>
                        Steam
                    </button>
                    <button id="platform-oculus-pc" onclick="setPlatform('oculus-pc')" 
                        class="platform-btn flex-1 sm:flex-none flex items-center justify-center gap-2 px-5 py-2.5 rounded-xl text-xs font-bold transition-all uppercase tracking-widest text-gray-500 hover:text-gray-200 hover:bg-white/5 relative z-10">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12c0 5.52 4.48 10 10 10 5.52 0 10-4.48 10-10C22 6.48 17.52 2 12 2zm-3.5 13.5c-1.93 0-3.5-1.57-3.5-3.5S6.57 8.5 8.5 8.5 12 10.07 12 12s-1.57 3.5-3.5 3.5zm7 0c-1.93 0-3.5-1.57-3.5-3.5S13.57 8.5 15.5 8.5 19 10.07 19 12s-1.57 3.5-3.5 3.5z"/></svg>
                        Oculus PC
                    </button>
                    <button id="platform-oculus-quest" onclick="setPlatform('oculus-quest')" 
                        class="platform-btn flex-1 sm:flex-none flex items-center justify-center gap-2 px-5 py-2.5 rounded-xl text-xs font-bold transition-all uppercase tracking-widest text-gray-500 hover:text-gray-200 hover:bg-white/5 relative z-10">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
                        Quest APK
                    </button>
                </div>
            </div>

            <!-- Secondary Controls (Search & Filters) -->
            <div class="flex flex-col sm:flex-row gap-4 mt-6 justify-between items-center border-t border-white/5 pt-6">
                <div class="flex flex-wrap gap-2 w-full sm:w-auto">
                    <button id="filter-btn" onclick="toggleFilter()" 
                        class="flex-1 sm:flex-none px-4 py-2.5 bg-black/40 border border-white/5 rounded-xl text-xs font-bold text-gray-400 hover:text-white hover:border-white/20 transition-all uppercase tracking-widest">
                        <span class="flex items-center justify-center gap-2">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/></svg>
                            <span id="filter-btn-text">All Builds</span>
                        </span>
                    </button>
                     <button id="branch-btn" onclick="toggleBranch()" aria-label="Toggle branch filter"
                        class="flex-1 sm:flex-none px-4 py-2.5 bg-black/40 border border-white/5 rounded-xl text-xs font-bold text-gray-400 hover:text-white hover:border-white/20 transition-all uppercase tracking-widest">
                         <span class="flex items-center justify-center gap-2">
                             <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h4a2 2 0 012 2v2M5 7h14"/></svg>
                            <span id="branch-btn-text">All Branches</span>
                        </span>
                    </button>
                </div>

                <div class="w-full sm:w-80 relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="h-4 w-4 text-gray-500 group-focus-within:text-emerald-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <input type="text" id="search-input" placeholder="Search builds... (Ctrl+K)" aria-label="Search builds"
                        class="w-full pl-11 pr-10 py-2.5 bg-black/40 border border-white/10 rounded-xl text-sm text-gray-200 placeholder-gray-600 focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 outline-none transition-all shadow-inner">
                    <button id="search-clear" onclick="clearSearch()" aria-label="Clear search"
                        class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-gray-500 hover:text-white transition-colors hidden">
                        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
            </div>

            <!-- Year Tabs -->
            <nav class="flex flex-wrap gap-2 mt-6 pt-4 border-t border-white/5" id="year-tabs-container" role="tablist" aria-label="Filter by year">
                <!-- Tabs generated by JS -->
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="w-full max-w-5xl mx-auto mt-8 flex-grow relative" role="main">
        <div id="update-list-container" class="space-y-4" aria-live="polite">
            <!-- Cards generated by JS -->
        </div>
    </main>

    <!-- Pagination Controls (Hidden by default) -->
    <nav id="pagination-controls" class="w-full max-w-5xl mx-auto mt-10 justify-center items-center py-6 border-t border-white/5 text-sm hidden" aria-label="Pagination">
        <button id="page-prev" onclick="goToPage(-1)" disabled class="px-5 py-2.5 mx-1 rounded-xl bg-black/40 border border-white/5 text-gray-500 cursor-not-allowed hover:text-gray-300 transition-all">
            Previous
        </button>
        <span id="page-info" class="px-4 py-2 mx-2 text-gray-400 min-w-[80px] text-center font-medium"></span>
        <button id="page-next" onclick="goToPage(1)" class="px-5 py-2.5 mx-1 rounded-xl bg-black/40 border border-white/5 text-gray-500 cursor-not-allowed hover:text-gray-300 transition-all">
            Next
        </button>
    </nav>

    <!-- Back to Top -->
    <button id="back-to-top" onclick="scrollToTop()" aria-label="Scroll to top"
        class="fixed bottom-8 right-8 z-50 w-14 h-14 bg-emerald-600/90 backdrop-blur-md border border-emerald-400/50 rounded-2xl text-white hover:bg-emerald-500 shadow-[0_0_20px_rgba(16,185,129,0.3)] transition-all duration-300 opacity-0 translate-y-6 pointer-events-none flex items-center justify-center">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 15l7-7 7 7"></path></svg>
    </button>

    <!-- Toast Notification -->
    <div id="toast" role="status" aria-live="polite"
        class="fixed bottom-8 left-1/2 transform -translate-x-1/2 translate-y-24 opacity-0 transition-all duration-400 ease-out z-50 bg-gray-900 border border-emerald-500/50 text-white px-6 py-3.5 rounded-2xl shadow-[0_10px_40px_rgba(0,0,0,0.5)] flex items-center space-x-3 font-medium">
        <div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center text-emerald-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <span id="toast-message">Copied to clipboard</span>
    </div>

    <!-- Footer -->
    <footer class="w-full max-w-5xl mx-auto py-10 mt-8 text-center text-gray-600 text-xs space-y-2 border-t border-white/5" role="contentinfo">
        <p class="font-medium text-gray-500">Gorilla Tag Depot Archive — Community-maintained build index</p>
        <p class="text-gray-700">Press <kbd class="px-2 py-1 bg-black border border-white/5 rounded-md text-[10px] text-gray-400 font-mono shadow-inner">Ctrl</kbd> + <kbd class="px-2 py-1 bg-black border border-white/5 rounded-md text-[10px] text-gray-400 font-mono shadow-inner">K</kbd> to search &middot; <kbd class="px-2 py-1 bg-black border border-white/5 rounded-md text-[10px] text-gray-400 font-mono shadow-inner">Esc</kbd> to clear</p>
    </footer>

    <!-- Data Scripts -->
    <script src="assets/js/data/updates-data.js"></script>
    <script src="assets/js/data/oculus-pc-data.js"></script>
    <script src="assets/js/data/oculus-quest-data.js"></script>
    
    <!-- App Script -->
    <script src="assets/js/app/main.js" defer></script>
</body>
</html>
